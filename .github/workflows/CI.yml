name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install Rust toolchain
        uses: actions-rs/cargo-setup@v1
        with:
          crates: "maturin"
      
      - name: Install maturin
        run: pip install maturin
      
      - name: Build wheel
        working-directory: pyext
        run: maturin build
      
      - name: Install wheel
        working-directory: pyext
        run: pip install --force-reinstall target/wheels/*.whl
      
      - name: Run tests
        working-directory: pyext
        run: python -m pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Install mypy
        run: pip install mypy
      
      - name: Run mypy on type stubs
        run: mypy pyext/syntect.pyi --ignore-missing-imports

  benchmark:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Install Rust toolchain
        uses: actions-rs/cargo-setup@v1
        with:
          crates: "maturin"
      
      - name: Install maturin
        run: pip install maturin
      
      - name: Build wheel
        working-directory: pyext
        run: maturin build
      
      - name: Install wheel
        working-directory: pyext
        run: pip install --force-reinstall target/wheels/*.whl
      
      - name: Run benchmarks
        working-directory: pyext
        run: python examples/benchmark.py --iterations 50
